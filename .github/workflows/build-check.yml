name: Build Check

on:
  pull_request:
    branches: [ "development","main" ]

jobs:
  tests:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Run Pester Unit Tests
        shell: pwsh
        run: |
          Invoke-Pester -Path ./tests/action.Tests.ps1

      - name: Start Mock Server
        shell: pwsh
        run: |
          $global:job = Start-Job -ScriptBlock {
            param($Port)
            & "$using:PWD/tests/Start-MockServer.ps1" -Port $Port
          } -ArgumentList 3000
          
          # Wait for server to be ready
          $maxAttempts = 10
          $attempt = 0
          $serverReady = $false
          
          while ($attempt -lt $maxAttempts -and -not $serverReady) {
            Start-Sleep -Seconds 2
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:3000/HealthCheck" -Method Get -TimeoutSec 2 -ErrorAction SilentlyContinue
              if ($response.StatusCode -eq 200) {
                Write-Host "Mock server started successfully"
                $serverReady = $true
              }
            }
            catch {
              $attempt++
              Write-Host "Waiting for mock server (attempt $attempt/$maxAttempts)"
            }
          }
          
          if (-not $serverReady) {
            Write-Host "ERROR: Mock server failed to start"
            Stop-Job $global:job
            Remove-Job $global:job
            exit 1
          }
          
          # Save job ID for cleanup
          $global:job.Id | Out-File -FilePath "$env:GITHUB_WORKSPACE/mock-server-job-id.txt"

      - name: Run Integration Tests
        id: integration-tests
        uses: ./
        with:
          repo-name: 'TestRepo'
          owner: 'test-owner'
          token: 'fake-token'
          visibility: 'internal'
        env:
          MOCK_API: http://127.0.0.1:3000

      - name: Stop Mock Server
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "$env:GITHUB_WORKSPACE/mock-server-job-id.txt") {
            $jobId = Get-Content "$env:GITHUB_WORKSPACE/mock-server-job-id.txt"
            $job = Get-Job -Id $jobId -ErrorAction SilentlyContinue
            if ($job) {
              Stop-Job $job
              Remove-Job $job
              Write-Host "Mock server stopped"
            }
            Remove-Item "$env:GITHUB_WORKSPACE/mock-server-job-id.txt" -Force
          }

      - name: Check Integration Test Result
        shell: pwsh
        run: |
          if ("${{ steps.integration-tests.outputs.result }}" -eq "success") {
            Write-Host "Test passed: Integration test simulated successfully."
          } else {
            Write-Host "Test failed: ${{ steps.integration-tests.outputs.error-message }}"
            exit 1
          }
